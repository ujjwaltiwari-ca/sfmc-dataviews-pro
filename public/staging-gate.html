<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Private Preview — DataViews.pro</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: #020617;
        color: #f8fafc;
        padding: 1rem;
      }
      .card {
        width: 100%;
        max-width: 24rem;
        text-align: center;
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: #94a3b8; font-size: 0.875rem; margin: 0 0 1.5rem; }
      input, button {
        width: 100%;
        border-radius: 0.75rem;
        font-size: 0.875rem;
        padding: 0.75rem 1rem;
      }
      input {
        border: 1px solid #334155;
        background: #0f172a;
        color: #fff;
        margin-bottom: 0.75rem;
      }
      button {
        border: none;
        background: #fff;
        color: #020617;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .error { color: #fb7185; font-size: 0.75rem; min-height: 1rem; margin-top: 0.5rem; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>DataViews.pro — Private Preview</h1>
      <p>Enter the preview password to access the workspace.</p>
      <form id="gate-form">
        <label for="password" class="sr-only">Preview password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Password" required />
        <button type="submit" id="submit">Unlock</button>
        <p class="error" id="error" role="alert"></p>
      </form>
    </div>
    <script>
      const form = document.getElementById('gate-form');
      const passwordInput = document.getElementById('password');
      const errorEl = document.getElementById('error');
      const submitBtn = document.getElementById('submit');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorEl.textContent = '';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Verifying…';

        try {
          const response = await fetch('/api/staging', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: passwordInput.value }),
          });

          if (response.ok) {
            const next = new URLSearchParams(window.location.search).get('next') || '/';
            window.location.replace(next);
            return;
          }

          if (response.status === 429) {
            errorEl.textContent = 'Too many attempts. Please wait and try again.';
          } else {
            errorEl.textContent = 'Incorrect password. Please try again.';
          }
          passwordInput.value = '';
        } catch {
          errorEl.textContent = 'Unable to verify password. Please try again.';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Unlock';
        }
      });
    </script>
  </body>
</html>
